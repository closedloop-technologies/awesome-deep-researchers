[tox]
# We are testing skills, not packaging the main project
skipsdist = True

# List all the skills (environments) you want to test
envlist =
    exa-research
    gpt-researcher
    jina-ai
    langchain-deep-research
    openai-deep-research
    perplexity-sonar
    smolagents
    stanford-storm
    tavily-search
    xai-grok
    you-research
    gemini-deep-research
    okf-normalize-research
    custom-data-deep-research

# Base configuration for all test environments
[testenv]
# Core dependencies needed to run pytest (matching your test-requirements.txt base)
deps =
    pytest>=7.4.0
    pytest-asyncio>=0.21.0
    pytest-mock>=3.11.0
    python-dotenv>=1.0.0

# Pass environment variables (like API keys) through for integration tests
passenv = *

# Configuration specific to the skills listed in envlist.
# This uses "factor-dependencies" to apply this config generically.
[testenv:{exa-research,gpt-researcher,jina-ai,langchain-deep-research,openai-deep-research,perplexity-sonar,smolagents,stanford-storm,tavily-search,xai-grok}]

# Install the specific requirements file for the current skill ({envname})
deps =
    {[testenv]deps}
    -r.claude/skills/{envname}/requirements.txt

# Run pytest only on the specific skill's tests
commands = pytest .claude/skills/{envname}/tests/ -v

[testenv:okf-normalize-research]
deps =
    {[testenv]deps}
commands = pytest .agents/skills/okf-normalize-research/tests/ -v

[testenv:custom-data-deep-research]
deps =
    {[testenv]deps}
commands = pytest .agents/skills/custom-data-deep-research/tests/ -v

[testenv:{you-research,gemini-deep-research}]
deps =
    {[testenv]deps}
    -r.agents/skills/{envname}/requirements.txt
commands = pytest .agents/skills/{envname}/tests/ -v
