[tox]
# We are testing skills, not packaging the main project
skipsdist = True

# List all the skills (environments) you want to test
envlist =
    deep-research-exa
    deep-research-gpt-researcher
    deep-research-jina
    deep-research-langchain
    deep-research-openai
    deep-research-perplexity
    deep-research-smolagents
    deep-research-stanford-storm
    deep-research-tavily
    deep-research-xai-grok
    deep-research-you
    deep-research-gemini
    deep-research-okf-normalize
    deep-research-custom-data

# Base configuration for all test environments
[testenv]
# Core dependencies needed to run pytest (matching your test-requirements.txt base)
deps =
    pytest>=7.4.0
    pytest-asyncio>=0.21.0
    pytest-mock>=3.11.0
    python-dotenv>=1.0.0

# Pass environment variables (like API keys) through for integration tests
passenv = *

# Configuration specific to the skills listed in envlist.
# This uses "factor-dependencies" to apply this config generically.
[testenv:{deep-research-exa,deep-research-gpt-researcher,deep-research-jina,deep-research-langchain,deep-research-openai,deep-research-perplexity,deep-research-smolagents,deep-research-stanford-storm,deep-research-tavily,deep-research-xai-grok}]

# Install the specific requirements file for the current skill ({envname})
deps =
    {[testenv]deps}
    -r.agents/skills/{envname}/requirements.txt

# Run pytest only on the specific skill's tests
commands = pytest .agents/skills/{envname}/tests/ -v

[testenv:deep-research-okf-normalize]
deps =
    {[testenv]deps}
commands = pytest .agents/skills/deep-research-okf-normalize/tests/ -v

[testenv:deep-research-custom-data]
deps =
    {[testenv]deps}
commands = pytest .agents/skills/deep-research-custom-data/tests/ -v

[testenv:{deep-research-you,deep-research-gemini}]
deps =
    {[testenv]deps}
    -r.agents/skills/{envname}/requirements.txt
commands = pytest .agents/skills/{envname}/tests/ -v
